<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сравнение чисел</title>
</head>
<body>

<h1>Сравни два числа</h1>

<input type="number" id="num1" placeholder="Первое число">
<input type="number" id="num2" placeholder="Второе число">
<button onclick="checkNumbers()">Проверить</button>

<p id="result"></p>

<script>
function checkNumbers() {
    let a = document.getElementById('num1').value;
    let b = document.getElementById('num2').value;
    
    if (a === b) {
        document.getElementById('result').innerHTML = "Wow";
    } else {
        document.getElementById('result').innerHTML = "";
    }
}
</script>

</body>
</html>
