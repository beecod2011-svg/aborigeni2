<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Живые отзывы | Google Sheets синхронизация</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffcdcd, #dce5ff, #ffcdcd);
            font-family: 'Inter', system-ui, sans-serif;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .reviews-container { max-width: 800px; width: 100%; margin: 0 auto; }
        .glass-card-modern {
            background: rgba(62, 8, 8, 0.2);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(0, 0, 0, 0.958);
            padding: 1.8rem;
            margin-bottom: 2rem;
            box-shadow: 0 25px 45px rgba(255, 0, 0, 0.3);
        }
        .section-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.8rem;
            font-size: 1.6rem;
            font-family: Georgia, serif;
            font-weight: 600;
            background: linear-gradient(135deg, #d5eeff, #ff8686);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .input-modern {
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(255, 85, 85, 0.1);
            border: 1px solid rgba(197, 176, 176, 0.2);
            border-radius: 20px;
            font-size: 1rem;
            color: rgb(133, 68, 68);
            outline: none;
        }
        .stars-modern {
            display: flex;
            gap: 0.5rem;
            font-size: 2rem;
            cursor: pointer;
        }
        .star-modern { color: rgba(0,0,0,0.3); cursor: pointer; transition: all 0.2s; }
        .star-modern.active { color: #ffd700; text-shadow: 0 0 10px #ffaa00; }
        .btn-submit-modern {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #a9ff93, #7ee386);
            border: none;
            border-radius: 28px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .status-modern { margin-top: 1rem; padding: 0.75rem; border-radius: 20px; text-align: center; }
        .status-success { background: rgba(0,0,0,0.2); border: 1px solid rgba(131,255,176,0.5); }
        .status-error { background: rgba(0,0,0,0.2); border: 1px solid rgba(239,68,68,0.5); }
        .review-card-modern {
            background: rgba(224,200,200,0.05);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 1.2rem;
            margin-bottom: 1rem;
        }
        .review-name { font-weight: 700; background: linear-gradient(135deg,#fff,#8ef976); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .review-stars { color: #ffd700; letter-spacing: 2px; }
        .review-text { color: rgba(255,255,255,0.85); margin: 0.6rem 0; }
        .review-date { font-size: 0.7rem; color: rgba(255,255,255,0.4); }
        .sync-badge { font-size: 0.7rem; background: rgba(0,0,0,0.5); padding: 0.2rem 0.6rem; border-radius: 20px; color: #bbffaa; }
        .online-dot { display: inline-block; width: 10px; height: 10px; background-color: #4caf50; border-radius: 50%; margin-right: 6px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 100% { opacity: 1; } }
        .reviews-list-modern { max-height: 450px; overflow-y: auto; }
    </style>
</head>
<body>
<div class="reviews-container">
    <div class="glass-card-modern">
        <div class="section-title">
            <span>✍️</span>
            <span>Оставить отзыв</span>
            <span class="sync-badge"><span class="online-dot"></span> 🌍 глобально</span>
        </div>
        <input type="text" id="reviewName" class="input-modern" placeholder="📝 Ваше имя" autocomplete="off">
        <input type="text" id="reviewText" class="input-modern" placeholder="💬 Ваш отзыв" autocomplete="off" style="margin-top: 1rem;">
        <div class="stars-modern" id="starsContainer" style="margin: 1rem 0;">
            <span class="star-modern" data-rating="1">★</span>
            <span class="star-modern" data-rating="2">★</span>
            <span class="star-modern" data-rating="3">★</span>
            <span class="star-modern" data-rating="4">★</span>
            <span class="star-modern" data-rating="5">★</span>
        </div>
        <input type="hidden" id="reviewRating" value="0">
        <button class="btn-submit-modern" id="submitReviewBtn">📤 Отправить (увидят все!)</button>
        <div id="statusMessage" class="status-modern"></div>
    </div>

    <div class="glass-card-modern">
        <div class="section-title" style="justify-content: space-between;">
            <span>📋 Все отзывы <span id="reviewsCounter" style="background:rgba(0,0,0,0.3); padding:0.2rem 0.6rem; border-radius:20px;">0</span></span>
            <button id="clearAllBtn" style="background:none; border:none; color:white; cursor:pointer; font-size:1.2rem;">🗑️</button>
        </div>
        <div id="reviewsList" class="reviews-list-modern">
            <div style="text-align:center; padding:2rem;">⏳ Загрузка отзывов из облака...</div>
        </div>
    </div>
</div>

<script>
    // ========== GOOGLE SHEETS КОНФИГ ==========
    // ★★★ ВАЖНО: Подруга должна создать таблицу и вставить сюда ID ★★★
    // Как получить: создать Google Таблицу → Нажать "Поделиться" → "Доступ по ссылке" (редактирование)
    // ID таблицы — это часть URL: docs.google.com/spreadsheets/d/ЭТОТ_ID/edit
    
    const GOOGLE_SHEETS_ID = "1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgvE2upms"; // ← ЗАМЕНИТЕ НА СВОЙ!
    // Используем бесплатный API сервис sheetsu.co (не требует бекенда)
    // Альтернатива: можно использовать sheet.best или sheetdb.io
    
    // Для простоты используем бесплатный сервис sheetdb.io (регистрация не нужна)
    // Нужно сделать 2 простых шага:
    // 1. Создать таблицу Google Sheets
    // 2. Перейти на sheetdb.io и нажать "Create API from Google Sheet"
    
    let currentReviews = [];
    let API_URL = "";
    
    // ПРОВЕРЯЕМ: если ID не заменён, показываем инструкцию
    const isDefaultSheet = GOOGLE_SHEETS_ID === "1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgvE2upms";
    
    if (isDefaultSheet) {
        document.getElementById('reviewsList').innerHTML = `
            <div style="text-align:center; padding:2rem; background:rgba(0,0,0,0.5); border-radius:20px;">
                🔧 <strong>Настройка глобальной синхронизации (1 минута):</strong><br><br>
                1️⃣ <strong>Подруга создаёт Google Таблицу</strong> с колонками: <code>name, text, rating, date</code><br>
                2️⃣ Нажимает <strong>"Поделиться"</strong> → <strong>"Доступ по ссылке"</strong> → <strong>"Редактор"</strong><br>
                3️⃣ Копирует <strong>ID таблицы</strong> из URL<br>
                4️⃣ Вставляет ID в переменную <strong style="color:#aaffaa;">GOOGLE_SHEETS_ID</strong> в коде<br>
                5️⃣ Загружает страницу заново — отзывы синхронизируются!<br><br>
                📌 <a href="https://youtu.be/watch?v=example" target="_blank" style="color:#aaffaa;">Видеоинструкция</a>
            </div>
        `;
    } else {
        // Настраиваем API через бесплатный сервис sheet.best
        const API_URL = "https://api.sheetbest.com/sheets/c809c54c-ac4c-46a5-aa57-3c6659a9b8f2";
    }
    
    // ЗВЁЗДЫ
    let currentRating = 0;
    const stars = document.querySelectorAll('.star-modern');
    const ratingInput = document.getElementById('reviewRating');
    
    stars.forEach(star => {
        star.addEventListener('click', function() {
            currentRating = parseInt(this.dataset.rating);
            ratingInput.value = currentRating;
            stars.forEach((s, i) => {
                if (i < currentRating) s.classList.add('active');
                else s.classList.remove('active');
            });
        });
    });
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function showStatus(msg, isError = false) {
        const div = document.getElementById('statusMessage');
        div.textContent = msg;
        div.className = `status-modern ${isError ? 'status-error' : 'status-success'}`;
        setTimeout(() => { if (div.textContent === msg) div.textContent = ''; }, 4000);
    }
    
    async function loadReviews() {
        if (!API_URL || isDefaultSheet) return;
        
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            currentReviews = (data || []).map(row => ({
                id: row.id || Math.random(),
                name: row.name || 'Аноним',
                text: row.text || '',
                rating: parseInt(row.rating) || 5,
                date: row.date || new Date().toLocaleString('ru-RU')
            })).sort((a,b) => new Date(b.date) - new Date(a.date));
            
            displayReviews();
            document.getElementById('liveIndicator')?.setAttribute('style', 'background:#4caf50');
        } catch(e) {
            console.error('Ошибка загрузки:', e);
            showStatus('⚠️ Ошибка загрузки отзывов', true);
        }
    }
    
    function displayReviews() {
        const container = document.getElementById('reviewsList');
        const counter = document.getElementById('reviewsCounter');
        counter.innerText = currentReviews.length;
        
        if (currentReviews.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:2rem;">✨ Пока нет отзывов. Будьте первым!</div>';
            return;
        }
        
        container.innerHTML = currentReviews.map(review => `
            <div class="review-card-modern">
                <div class="review-header" style="display:flex; justify-content:space-between;">
                    <span class="review-name">${escapeHtml(review.name)}</span>
                    <span class="review-stars">${'★'.repeat(review.rating)}${'☆'.repeat(5-review.rating)}</span>
                </div>
                <div class="review-text">${escapeHtml(review.text)}</div>
                <div class="review-date">📅 ${escapeHtml(review.date)}</div>
            </div>
        `).join('');
    }
    
    async function addReview(name, text, rating) {
        if (!API_URL || isDefaultSheet) {
            showStatus('❌ Сначала настройте Google Sheets ID', true);
            return false;
        }
        
        try {
            const newReview = {
                name: name,
                text: text,
                rating: rating,
                date: new Date().toLocaleString('ru-RU')
            };
            
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newReview)
            });
            
            await loadReviews(); // перезагружаем
            return true;
        } catch(e) {
            console.error('Ошибка добавления:', e);
            showStatus('❌ Ошибка при отправке', true);
            return false;
        }
    }
    
    async function clearAllReviews() {
        if (!API_URL || isDefaultSheet) return;
        if (currentReviews.length === 0) return;
        if (!confirm('⚠️ Удалить ВСЕ отзывы навсегда?')) return;
        
        try {
            await fetch(API_URL, { method: 'DELETE' });
            await loadReviews();
            showStatus('✅ Все отзывы удалены', false);
        } catch(e) {
            showStatus('❌ Ошибка удаления', true);
        }
    }
    
    // Обработчик отправки
    document.getElementById('submitReviewBtn')?.addEventListener('click', async () => {
        const name = document.getElementById('reviewName').value.trim();
        const text = document.getElementById('reviewText').value.trim();
        const rating = parseInt(ratingInput.value);
        
        if (!name) { showStatus('❌ Введите имя', true); return; }
        if (!text) { showStatus('❌ Напишите отзыв', true); return; }
        if (!rating) { showStatus('❌ Поставьте оценку', true); return; }
        
        const btn = document.getElementById('submitReviewBtn');
        btn.disabled = true;
        btn.style.opacity = '0.6';
        
        const success = await addReview(name, text, rating);
        
        if (success) {
            document.getElementById('reviewName').value = '';
            document.getElementById('reviewText').value = '';
            ratingInput.value = '0';
            currentRating = 0;
            stars.forEach(s => s.classList.remove('active'));
            showStatus('✅ Отзыв отправлен! Теперь его увидят все пользователи!', false);
        }
        
        btn.disabled = false;
        btn.style.opacity = '1';
    });
    
    document.getElementById('clearAllBtn')?.addEventListener('click', clearAllReviews);
    
    // Автообновление каждые 5 секунд
    if (!isDefaultSheet) {
        loadReviews();
        setInterval(loadReviews, 5000);
    }
</script>
</body>
</html>
