<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Живые отзывы | Синхронизация в реальном времени</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffcdcd, #dce5ff, #ffcdcd);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Главный контейнер */
        .reviews-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        /* СТЕКЛЯННАЯ КАРТОЧКА */
        .glass-card-modern {
            background: rgba(62, 8, 8, 0.2);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(0, 0, 0, 0.958);
            padding: 1.8rem;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
            box-shadow: 0 25px 45px rgba(255, 0, 0, 0.3);
        }

        .glass-card-modern:hover {
            border-color: rgba(253, 125, 125, 0.4);
            box-shadow: 0 30px 55px rgba(138, 29, 29, 0.4);
        }

        /* Заголовок */
        .section-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.8rem;
            font-size: 1.6rem;
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-weight: 600;
            background: linear-gradient(135deg, #d5eeff, #ff8686);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .section-title span {
            font-size: 2rem;
        }

        /* Поля ввода */
        .input-group-modern {
            margin-bottom: 1.2rem;
        }

        .input-group-modern label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(241, 241, 241, 0.8);
            font-size: 0.85rem;
            font-weight: 500;
            font-family: Georgia, 'Times New Roman', Times, serif;
            letter-spacing: 0.5px;
        }

        .input-modern {
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(255, 85, 85, 0.1);
            border: 1px solid rgba(197, 176, 176, 0.2);
            border-radius: 20px;
            font-size: 1rem;
            font-family: 'Courier New', Courier, monospace;
            color: rgb(133, 68, 68);
            transition: all 0.3s;
            outline: none;
        }

        .input-modern:focus {
            border-color: #ffa3a3;
            background: rgba(255, 212, 212, 0.785);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }

        .input-modern::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* Звёзды */
        .stars-modern {
            display: flex;
            gap: 0.5rem;
            font-size: 2rem;
            cursor: pointer;
            margin: 0.5rem 0;
        }

        .star-modern {
            transition: all 0.2s ease;
            color: rgba(251, 255, 255, 0.316);
            cursor: pointer;
        }

        .star-modern.active {
            color: #24fbe2;
            text-shadow: 0 0 10px #24e9fb;
        }

        .star-modern:hover {
            transform: scale(1.15);
        }

        /* Кнопка отправки */
        .btn-submit-modern {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #a9ff93, #7ee386);
            border: none;
            border-radius: 28px;
            color: rgb(0, 0, 0);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-submit-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(38, 255, 52, 0.4);
            gap: 0.8rem;
        }

        .btn-submit-modern:active {
            transform: translateY(1px);
        }

        /* Статус */
        .status-modern {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 20px;
            text-align: center;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .status-success {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(131, 255, 176, 0.5);
            color: #000000;
        }

        .status-error {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #000000;
        }

        /* Список отзывов */
        .reviews-list-modern {
            max-height: 450px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .reviews-list-modern::-webkit-scrollbar {
            width: 6px;
        }

        .reviews-list-modern::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .reviews-list-modern::-webkit-scrollbar-thumb {
            background: rgba(20, 203, 57, 0.3);
            border-radius: 10px;
        }

        /* Карточка одного отзыва */
        .review-card-modern {
            background: rgba(224, 200, 200, 0.05);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .review-card-modern:hover {
            background: rgba(27, 81, 31, 0.1);
            transform: translateX(5px);
            border-color: rgba(139, 255, 166, 0.5);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .review-name {
            font-weight: 700;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #fff, #8ef976);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .review-stars {
            font-size: 1rem;
            color: #ff6565;
            letter-spacing: 2px;
        }

        .review-text {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0.6rem 0;
        }

        .review-date {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* Кнопка очистки */
        .clear-btn-modern {
            width: 100%;
            padding: 0.7rem;
            background: rgba(79, 232, 82, 0.3);
            border: 1px solid rgba(58, 227, 55, 0.5);
            border-radius: 28px;
            color: #81f871;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s;
            font-weight: 500;
        }

        .clear-btn-modern:hover {
            background: rgba(239, 68, 68, 0.5);
            color: white;
        }

        /* Счётчик */
        .counter-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(87, 249, 171, 0.3);
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }

        /* Анимация появления */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .review-card-modern {
            animation: fadeInUp 0.4s ease-out;
        }

        /* небольшой индикатор синхронизации */
        .sync-badge {
            font-size: 0.7rem;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            margin-left: 0.8rem;
            color: #bbffaa;
        }
    </style>
</head>
<body>
    <div class="reviews-container">
        <!-- ФОРМА ОТЗЫВА -->
        <div class="glass-card-modern">
            <div class="section-title">
                <span>✍️</span>
                <span>Оставить отзыв</span>
                <span class="sync-badge" id="liveIndicator">🌐 live</span>
            </div>

            <div class="input-group-modern">
                <label>📝 Ваше рыцарское имя</label>
                <input type="text" id="reviewName" class="input-modern" placeholder="Например: Александр" autocomplete="off">
            </div>

            <div class="input-group-modern">
                <label>💬 Ваш рыцарский отзыв</label>
                <input type="text" id="reviewText" class="input-modern" placeholder="Поделитесь впечатлениями..." autocomplete="off">
            </div>

            <div class="input-group-modern">
                <label>⭐ Оценка</label>
                <div class="stars-modern" id="starsContainer">
                    <span class="star-modern" data-rating="1">★</span>
                    <span class="star-modern" data-rating="2">★</span>
                    <span class="star-modern" data-rating="3">★</span>
                    <span class="star-modern" data-rating="4">★</span>
                    <span class="star-modern" data-rating="5">★</span>
                </div>
                <input type="hidden" id="reviewRating" value="0">
            </div>

            <button class="btn-submit-modern" id="submitReviewBtn">
                <span>📤</span> Отправить отзыв
            </button>

            <div id="statusMessage" class="status-modern"></div>
        </div>

        <!-- СПИСОК ОТЗЫВОВ -->
        <div class="glass-card-modern">
            <div class="section-title" style="font-size: 1.3rem; justify-content: space-between;">
                <div style="display: flex; align-items: center;">
                    <span>📋</span>
                    <span>Все отзывы</span>
                    <span class="counter-badge" id="reviewsCounter">0</span>
                </div>
                <button id="clearAllBtn" style="background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 1.2rem;" title="Очистить всё">🗑️</button>
            </div>

            <div id="reviewsList" class="reviews-list-modern">
                <div style="text-align: center; padding: 2rem; opacity: 0.5;">
                    ✨ Пока нет отзывов. Будьте первым!
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  СИНХРОНИЗАЦИЯ В РЕАЛЬНОМ ВРЕМЕНИ (МЕЖДУ ВКЛАДКАМИ/УСТРОЙСТВАМИ)
        //  Используем localStorage + событие 'storage'
        //  При добавлении или удалении отзыва — обновляем все открытые страницы
        // ============================================================
        
        // 1. Загружаем отзывы из localStorage (общий источник истины)
        let reviews = JSON.parse(localStorage.getItem('modern_reviews')) || [];
        
        // DOM элементы
        const stars = document.querySelectorAll('.star-modern');
        const ratingInput = document.getElementById('reviewRating');
        let currentRating = 0;
        
        // ========== ЗВЁЗДЫ: логика как раньше, но с небольшим рефакторингом ==========
        function updateStarsDisplay(rating) {
            stars.forEach((star, index) => {
                if (index < rating) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }
        
        stars.forEach(star => {
            star.addEventListener('click', function() {
                currentRating = parseInt(this.dataset.rating);
                ratingInput.value = currentRating;
                updateStarsDisplay(currentRating);
            });
            
            star.addEventListener('mouseenter', function() {
                const hoverRating = parseInt(this.dataset.rating);
                stars.forEach((s, idx) => {
                    if (idx < hoverRating) {
                        s.style.color = '#fbbf24';
                        s.style.textShadow = '0 0 8px #fbbf24';
                    } else {
                        s.style.color = 'rgba(255,255,255,0.3)';
                        s.style.textShadow = 'none';
                    }
                });
            });
            
            star.addEventListener('mouseleave', function() {
                stars.forEach(s => {
                    s.style.color = '';
                    s.style.textShadow = '';
                });
                updateStarsDisplay(currentRating);
            });
        });
        
        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Отображение отзывов на основе глобального массива reviews
        function displayReviews() {
            const container = document.getElementById('reviewsList');
            const counter = document.getElementById('reviewsCounter');
            
            counter.innerText = reviews.length;
            
            if (reviews.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 2rem; opacity: 0.5;">
                        ✨ Пока нет отзывов. Будьте первым!
                    </div>
                `;
                return;
            }
            
            container.innerHTML = reviews.map(review => `
                <div class="review-card-modern">
                    <div class="review-header">
                        <span class="review-name">${escapeHtml(review.name)}</span>
                        <span class="review-stars">${'★'.repeat(review.rating)}${'☆'.repeat(5 - review.rating)}</span>
                    </div>
                    <div class="review-text">${escapeHtml(review.text)}</div>
                    <div class="review-date">
                        <span>📅</span> ${escapeHtml(review.date)}
                    </div>
                </div>
            `).join('');
            
            // Прокрутка вниз не делаем, чтобы не мешать чтению; но можно оставить анимацию
        }
        
        // Показ статусного сообщения
        function showStatus(message, isError = false) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = message;
            statusDiv.className = `status-modern ${isError ? 'status-error' : 'status-success'}`;
            
            setTimeout(() => {
                if (document.getElementById('statusMessage').textContent === message) {
                    statusDiv.textContent = '';
                    statusDiv.className = 'status-modern';
                }
            }, 3000);
        }
        
        // Сохраняем отзывы в localStorage и обновляем массив + UI
        function persistAndRender() {
            localStorage.setItem('modern_reviews', JSON.stringify(reviews));
            displayReviews();
        }
        
        // Добавление нового отзыва (централизованная логика)
        function addReviewFromForm() {
            const nameInput = document.getElementById('reviewName');
            const textInput = document.getElementById('reviewText');
            const name = nameInput.value.trim();
            const text = textInput.value.trim();
            const rating = parseInt(ratingInput.value);
            
            // Валидация
            if (name === '') {
                showStatus('❌ Пожалуйста, введите ваше имя', true);
                nameInput.style.borderColor = '#ef4444';
                setTimeout(() => {
                    nameInput.style.borderColor = 'rgba(255,255,255,0.2)';
                }, 2000);
                return false;
            }
            
            if (text === '') {
                showStatus('❌ Пожалуйста, напишите отзыв', true);
                textInput.style.borderColor = '#ef4444';
                setTimeout(() => {
                    textInput.style.borderColor = 'rgba(255,255,255,0.2)';
                }, 2000);
                return false;
            }
            
            if (rating === 0) {
                showStatus('❌ Пожалуйста, поставьте оценку (нажмите на звёздочки)', true);
                return false;
            }
            
            // Создаём новый объект отзыва
            const newReview = {
                id: Date.now(),
                name: name,
                text: text,
                rating: rating,
                date: new Date().toLocaleString('ru-RU', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                })
            };
            
            // ДОБАВЛЯЕМ В НАЧАЛО (новые сверху)
            reviews.unshift(newReview);
            
            // Сохраняем изменения (localStorage обновится, а displayReviews вызовется внутри persist)
            persistAndRender();
            
            // Очищаем форму
            nameInput.value = '';
            textInput.value = '';
            ratingInput.value = '0';
            currentRating = 0;
            updateStarsDisplay(0);
            
            // Показываем успех
            showStatus('✅ Спасибо за отзыв! Он виден всем посетителям.', false);
            
            // Анимация кнопки
            const btn = document.getElementById('submitReviewBtn');
            btn.style.transform = 'scale(0.97)';
            setTimeout(() => {
                btn.style.transform = '';
            }, 150);
            
            return true;
        }
        
        // Очистка всех отзывов с подтверждением
        function clearAllReviews() {
            if (reviews.length === 0) {
                showStatus('✨ Нет отзывов для удаления', false);
                return;
            }
            
            if (confirm('⚠️ Вы уверены, что хотите удалить ВСЕ отзывы? Это действие увидят все пользователи.')) {
                reviews = [];
                persistAndRender();
                showStatus('🗑️ Все отзывы удалены. Изменения синхронизированы.', false);
            }
        }
        
        // ========== КЛЮЧЕВАЯ ФИШКА: МЕЖТАБОВАЯ/МЕЖУСТРОЙСТВЕННАЯ СИНХРОНИЗАЦИЯ ==========
        // Слушаем событие storage (срабатывает на других вкладках/окнах при изменении localStorage)
        window.addEventListener('storage', (event) => {
            // Нас интересует только ключ 'modern_reviews'
            if (event.key === 'modern_reviews') {
                // Данные изменились в другой вкладке
                let newReviews;
                try {
                    newReviews = JSON.parse(event.newValue);
                } catch(e) {
                    newReviews = [];
                }
                
                if (newReviews) {
                    // Обновляем глобальный массив
                    reviews = newReviews;
                    // Перерисовываем список
                    displayReviews();
                    
                    // Показываем ненавязчивое уведомление о поступлении нового отзыва (но без спама)
                    const indicator = document.getElementById('liveIndicator');
                    indicator.style.backgroundColor = '#4caf50';
                    indicator.style.transition = '0.2s';
                    setTimeout(() => {
                        if (indicator) indicator.style.backgroundColor = '';
                    }, 500);
                    
                    // Небольшое сообщение (опционально, но полезно)
                    const statusDiv = document.getElementById('statusMessage');
                    // Не перезаписываем важные сообщения пользователя, но показываем ненавязчиво, если нет активного сообщения
                    if (!statusDiv.textContent || statusDiv.textContent.includes('Спасибо') === false) {
                        showStatus('🔄 Обновлено: появились новые отзывы или изменения', false);
                        setTimeout(() => {
                            if (document.getElementById('statusMessage')?.textContent === '🔄 Обновлено: появились новые отзывы или изменения')
                                document.getElementById('statusMessage').textContent = '';
                        }, 2000);
                    }
                }
            }
        });
        
        // Дополнительная прослушка для изменений, которые могут происходить на этой же вкладке (для надёжности)
        // Но persistAndRender уже вызывает обновление UI. Также после любой мутации reviews мы вызываем persistAndRender.
        // Чтобы изменения из той же вкладки тоже видели другие вкладки — localStorage.setItem генерирует storage только для ДРУГИХ окон.
        // Поэтому в этой вкладке всё и так обновится через persistAndRender.
        
        // ========== ИНИЦИАЛИЗАЦИЯ и дополнительные улучшения ==========
        
        // Функция, которая проверяет при загрузке страницы, нет ли конфликта, и синхронизирует
        function initSync() {
            // уже загрузили reviews из localStorage в самом начале, но на всякий случай перепроверим
            const stored = localStorage.getItem('modern_reviews');
            if (stored) {
                const parsed = JSON.parse(stored);
                // Если данные в памяти отличаются, используем свежие из хранилища (актуальные)
                if (JSON.stringify(parsed) !== JSON.stringify(reviews)) {
                    reviews = parsed;
                }
            }
            displayReviews();
        }
        
        // Устанавливаем обработчики кнопок
        document.getElementById('submitReviewBtn').addEventListener('click', addReviewFromForm);
        document.getElementById('clearAllBtn').addEventListener('click', clearAllReviews);
        
        // Отправка по клавише Enter (удобство)
        const nameField = document.getElementById('reviewName');
        const textField = document.getElementById('reviewText');
        
        function handleEnter(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                addReviewFromForm();
            }
        }
        
        nameField.addEventListener('keypress', handleEnter);
        textField.addEventListener('keypress', handleEnter);
        
        // Дополнительно: если пользователь кликнул на очистку, не должно быть багов.
        // Также делаем так, чтобы изменения в reviews (например через другой метод) всегда синхр.
        // Для максимальной надежности обернем persistAndRender в мутирующие функции, но у нас только clearAll и addReviewFromForm.
        // Однако, если вдруг какой-то внешний код (теоретически) захочет изменить массив — но мы все контролируем.
        
        // Небольшой "сердцебиение" для индикации живой связи (не обязательно, но эстетично)
        setInterval(() => {
            const indicator = document.getElementById('liveIndicator');
            if (indicator) {
                indicator.style.opacity = '1';
                setTimeout(() => {
                    if (indicator) indicator.style.opacity = '0.9';
                }, 300);
            }
        }, 4000);
        
        // Финальный старт: отображаем отзывы, если их загрузили
        initSync();
        
        // Доп. фича: если другой пользователь удалил все отзывы, то форма очищается от старых значений? необязательно.
        // Но чтобы синхронизация была максимально прозрачной, показываем сообщение об изменениях.
        // Теперь любой отзыв, добавленный с любого устройства/вкладки, мгновенно появляется у всех.
        // УРА! 🎉
        
        // Небольшое улучшение UX: если отзывов много, автоматически скроллить вниз при новом отзыве? 
        // Тут по желанию, но лучше не трогать, чтобы не сбивать с чтения. Оставим естественным.
        // Зато при добавлении своего отзыва вы сразу видите его сверху.
        
        // ИТОГ: отзывы синхронизируются через localStorage + storage event.
